services:
  postgres:
    image: postgres:16-alpine
    platform: linux/arm64
    environment:
      POSTGRES_USER: dride
      POSTGRES_PASSWORD: password
      POSTGRES_DB: dride
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    platform: linux/arm64
    ports:
      - "6379:6379"

volumes:
  pgdata:
